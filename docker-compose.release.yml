version: '3.8'

services:
  novelai-illustrator:
    # 使用在 GitHub Packages (ghcr.io) 上预编译构建好的镜像进行一键部署
    # 由 .github/workflows/docker-publish.yml 推送到 ghcr.io/${github.repository}
    image: ghcr.io/xiaosageou/novelai-auto-illustration-workflow:latest
    container_name: novelai-illustrator
    ports:
      - "5001:5001"
    volumes:
      - ./projects:/app/projects
      - ./illustrator_config.json:/app/illustrator_config.json
    restart: always
    environment:
      - PORT=5001
      - NODE_ENV=production
